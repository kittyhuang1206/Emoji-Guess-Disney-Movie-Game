    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];

      .filter(m => m.answer !== correctMovie.answer)
      .map(m => getMovieName(m, lang));
    const shuffled = shuffle([...new Set(wrong)]).slice(0, 3);
    return shuffle([correct, ...shuffled]);
  }

  function App() {
    const [lang, setLang] = useState("en");
    const [phase, setPhase] = useState("start");
    const [deck, setDeck] = useState([]);
    const [index, setIndex] = useState(0);
    const [score, setScore] = useState(0);
    const [streak, setStreak] = useState(0);
    const [bestStreak, setBestStreak] = useState(0);
    const [chosen, setChosen] = useState(null);
    const [feedback, setFeedback] = useState(null);
    const [choices, setChoices] = useState([]);
    const [hintUsed, setHintUsed] = useState(false);
    const [hintsLeft, setHintsLeft] = useState(3);
    const [showHint, setShowHint] = useState(false);
    const [timeLeft, setTimeLeft] = useState(15);
    const [timerActive, setTimerActive] = useState(false);
    const [showStreak, setShowStreak] = useState(false);
    const timerRef = useRef(null);

    const TOTAL = 10;
    const current = deck[index];
    const t = TEXT[lang];

    function startGame() {
      const d = shuffle(MOVIES).slice(0, TOTAL);
      setDeck(d);
      setIndex(0);
      setScore(0);
      setStreak(0);
      setBestStreak(0);
      setChosen(null);
      setFeedback(null);
      setHintUsed(false);
      setHintsLeft(3);
      setShowHint(false);
      setTimeLeft(15);
      setPhase("playing");
    }

    useEffect(() => {
      if (phase !== "playing" || !deck[index]) return;
      setChoices(buildChoices(deck[index], MOVIES, lang));
      setChosen(null);
      setFeedback(null);
      setHintUsed(false);
      setShowHint(false);
      setTimeLeft(15);
      setTimerActive(true);
    }, [index, phase, deck, lang]);

    useEffect(() => {
      if (!timerActive || feedback) return;
      if (timeLeft <= 0) {
        handleAnswer("__timeout__");
        return;
      }
      timerRef.current = setTimeout(() => setTimeLeft(x => x - 1), 1000);
      return () => clearTimeout(timerRef.current);
    }, [timeLeft, timerActive, feedback]);

    function handleAnswer(ans) {
      clearTimeout(timerRef.current);
      setTimerActive(false);
      setChosen(ans);

      const correctName = getMovieName(current, lang);
      const isRight = ans === correctName;
      setFeedback(isRight ? "right" : "wrong");

      if (isRight) {
        const bonus = hintUsed ? 0 : timeLeft >= 10 ? 3 : timeLeft >= 5 ? 2 : 1;
        setScore(s => s + 1 + bonus);
        const newStreak = streak + 1;
        setStreak(newStreak);
        if (newStreak > bestStreak) setBestStreak(newStreak);
        if (newStreak >= 3) {
          setShowStreak(true);
          setTimeout(() => setShowStreak(false), 1600);
        }
      } else {
        setStreak(0);
      }

      setTimeout(() => {
        if (index + 1 >= TOTAL) setPhase("result");
        else setIndex(i => i + 1);
      }, 1500);
    }

    function useHint() {
      if (hintsLeft <= 0 || showHint || feedback) return;
      setHintsLeft(h => h - 1);
      setHintUsed(true);
      setShowHint(true);
    }

    function getGrade() {
      const pct = score / (TOTAL * 4);
      if (pct >= 0.85) return { label: t.grades[0], emoji: "🏆" };
      if (pct >= 0.65) return { label: t.grades[1], emoji: "🌟" };
      if (pct >= 0.45) return { label: t.grades[2], emoji: "🎬" };
      return { label: t.grades[3], emoji: "🍿" };
    }

    const timerColor = timeLeft > 9 ? "#22c55e" : timeLeft > 4 ? "#f59e0b" : "#ef4444";
    const timerPct = (timeLeft / 15) * 100;

    function Background() {
      return React.createElement(React.Fragment, null,
        React.createElement("div", { className: "cloud cloud1" }),
        React.createElement("div", { className: "cloud cloud2" }),

        React.createElement("div", { className: "magic-orb orb-left" }),
        React.createElement("div", { className: "magic-orb orb-right" }),

        React.createElement("div", { className: "side-float float-left-1" }, "🎬"),
        React.createElement("div", { className: "side-float float-left-2" }, "🌟"),
        React.createElement("div", { className: "side-float float-right-1" }, "🏰"),
        React.createElement("div", { className: "side-float float-right-2" }, "✨"),

        React.createElement("div", { className: "sparkle s1" }, "✨"),
        React.createElement("div", { className: "sparkle s2" }, "🌟"),
        React.createElement("div", { className: "sparkle s3" }, "✨"),

        React.createElement("div", { className: "castle" },
          React.createElement("div", { className: "base" }),
          React.createElement("div", { className: "tower tower1" }),
          React.createElement("div", { className: "tower tower2" }),
          React.createElement("div", { className: "tower tower3" }),
          React.createElement("div", { className: "tower tower4" }),
          React.createElement("div", { className: "tower tower5" }),
          React.createElement("div", { className: "door" })
        )
      );
    }

    function LanguageToggle() {
      return React.createElement("div", { className: "lang-toggle" },
        React.createElement("button", {
          className: lang === "en" ? "active" : "",
          onClick: () => setLang("en")
        }, "English"),
        React.createElement("button", {
          className: lang === "zh" ? "active" : "",
          onClick: () => setLang("zh")
        }, "繁體中文")
      );
    }

    if (phase === "start") {
      return React.createElement("div", { className: "page" },
        React.createElement(Background),
        React.createElement("div", { className: "credit" }, t.credit),
        React.createElement(LanguageToggle),
        React.createElement("div", { className: "card" },
          React.createElement("div", { style: { fontSize: "5rem" } }, "🏰"),
          React.createElement("h1", { className: "title" }, t.title),
          React.createElement("p", { className: "subtitle" }, t.subtitle),
          React.createElement("div", { className: "rules" },
            t.rules.map((r, i) =>
              React.createElement("div", { className: "rule", key: i },
                React.createElement("span", null, ["🎯", "⚡", "💡", "✨"][i]),
                React.createElement("span", null, r)
              )
            )
          ),
          React.createElement("button", { className: "button", onClick: startGame }, t.play)
        )
      );
    }

    if (phase === "result") {
      const grade = getGrade();
      return React.createElement("div", { className: "page" },
        React.createElement(Background),
        React.createElement("div", { className: "credit" }, t.credit),
        React.createElement(LanguageToggle),
        React.createElement("div", { className: "card" },
          React.createElement("div", { style: { fontSize: "4.5rem" } }, grade.emoji),
          React.createElement("h1", { className: "title" }, t.complete),
          React.createElement("div", { className: "result-score" }, score),
          React.createElement("div", { className: "subtitle" }, `${t.outOf} ${TOTAL * 4}`),
          React.createElement("div", { className: "grade" }, grade.label),
          React.createElement("div", { className: "stats" },
            React.createElement("div", { className: "statbox" },
              React.createElement("div", { className: "statnum" }, score),
              React.createElement("div", { className: "statlabel" }, t.points)
            ),
            React.createElement("div", { className: "statbox" },
              React.createElement("div", { className: "statnum" }, bestStreak),
              React.createElement("div", { className: "statlabel" }, t.bestStreak)
            ),
            React.createElement("div", { className: "statbox" },
              React.createElement("div", { className: "statnum" }, hintsLeft),
              React.createElement("div", { className: "statlabel" }, t.hintsLeft)
            )
          ),
          React.createElement("button", { className: "button", onClick: startGame }, t.playAgain)
        )
      );
    }

    return React.createElement("div", { className: "page" },
      React.createElement(Background),
      React.createElement("div", { className: "credit" }, t.credit),

      showStreak && React.createElement("div", { className: "toast" }, `🔥 ${streak} ${t.streak}`),

      React.createElement(LanguageToggle),

      React.createElement("div", { className: "topbar" },
        React.createElement("div", { className: "topstat" },
          React.createElement("span", { className: "toplabel" }, t.score),
          React.createElement("span", null, score)
        ),
        React.createElement("div", { className: "progress" },
          React.createElement("div", {
            className: "progress-fill",
            style: { width: `${(index / TOTAL) * 100}%` }
          })
        ),
        React.createElement("div", { className: "topstat" },
          React.createElement("span", { className: "toplabel" }, t.question),
          React.createElement("span", null, `${index + 1}/${TOTAL}`)
        )
      ),

      React.createElement("div", { className: "timer" },
        React.createElement("div", {
          className: "timer-fill",
          style: { width: `${timerPct}%`, background: timerColor }
        })
      ),

      React.createElement("div", {
        className: "time-text",
        style: { color: timerColor }
      }, `⏱ ${timeLeft}${t.time}`),

      React.createElement("div", { className: "game-card" },
        React.createElement("div", { className: "year" }, current ? current.year : ""),
        React.createElement("div", { className: "emoji-box" }, current ? current.emojis : ""),

        showHint && React.createElement("div", { className: "hint" },
          `💡 ${lang === "zh" ? current.zhHint : current.hint}`
        ),

        React.createElement("div", { className: "choices" },
          choices.map((c, i) => {
            const correctName = getMovieName(current, lang);
            const isCorrect = c === correctName;
            const isChosen = c === chosen;
            let cls = "choice";
            if (feedback && isCorrect) cls += " correct";
            if (feedback && isChosen && !isCorrect) cls += " wrong";

            return React.createElement("button", {
              key: i,
              className: cls,
              onClick: () => !feedback && handleAnswer(c),
              disabled: !!feedback
            }, c + (feedback && isCorrect ? " ✓" : "") + (feedback && isChosen && !isCorrect ? " ✗" : ""));
          })
        ),

        React.createElement("button", {
          className: "hint-button",
          onClick: useHint,
          disabled: hintsLeft <= 0 || showHint || !!feedback
        }, `${t.hintButton} (${hintsLeft} ${t.left})`)
      ),

      chosen === "__timeout__" && React.createElement("div", { className: "timeout" },
        `${t.timeout} ${getMovieName(current, lang)}`
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
